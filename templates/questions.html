<!DOCTYPE html>
<html>
<head>
    <title>Manage Questions</title>
    <style>
        body { font-family: "Segoe UI", Arial, sans-serif; background:#f4f6f9; margin:0; padding:0; }
        header { background:#2c3e50; color:#fff; padding:20px; text-align:center; }
        .container { max-width:900px; margin:40px auto; background:#fff; padding:30px; border-radius:10px; box-shadow:0 6px 15px rgba(0,0,0,0.1); }
        table { width:100%; border-collapse:collapse; margin-top:20px; }
        th, td { border:1px solid #ddd; padding:10px; text-align:center; }
        th { background:#3498db; color:#fff; }
        .btn { padding:6px 12px; background:#27ae60; color:#fff; border:none; border-radius:6px; cursor:pointer; }
        .btn.danger { background:#e74c3c; }
        .btn:hover { opacity:0.9; }
        .form-inline { display:flex; flex-wrap:wrap; gap:10px; margin-top:20px; }
        input, select { padding:6px; border:1px solid #ccc; border-radius:4px; }
    </style>
</head>
<body>
    <header>
        <h1>Admin Panel - Manage Questions</h1>
    </header>

    <div class="container">
        <h2>Question Bank</h2>

        <!-- Add Question Form -->
        <form action="/admin/add_question" method="post" class="form-inline">
            <input type="text" name="text" placeholder="Question Text" required style="flex:1;">
            <input type="text" name="option_a" placeholder="Option A" required>
            <input type="text" name="option_b" placeholder="Option B" required>
            <input type="text" name="option_c" placeholder="Option C" required>
            <input type="text" name="option_d" placeholder="Option D" required>
            <select name="correct_option" required>
                <option value="option_a">A</option>
                <option value="option_b">B</option>
                <option value="option_c">C</option>
                <option value="option_d">D</option>
            </select>
            <button type="submit" class="btn">Add Question</button>
        </form>

        <!-- Questions Table -->
        <table>
            <tr>
                <th>ID</th>
                <th>Text</th>
                <th>Options</th>
                <th>Correct</th>
                <th>Actions</th>
            </tr>
            {% for q in questions %}
            <tr>
                <td>{{ q['id'] }}</td>
                <td>{{ q['text'] }}</td>
                <td>
                    A: {{ q['option_a'] }}<br>
                    B: {{ q['option_b'] }}<br>
                    C: {{ q['option_c'] }}<br>
                    D: {{ q['option_d'] }}
                </td>
                <td>{{ q['correct_option'] }}</td>
                <td>
                    <!-- Update Question -->
                    <form action="/admin/update_question/{{ q['id'] }}" method="post" style="display:inline;">
                        <input type="text" name="new_text" placeholder="New Question Text" required>
                        <select name="new_correct_option" required>
                            <option value="option_a">A</option>
                            <option value="option_b">B</option>
                            <option value="option_c">C</option>
                            <option value="option_d">D</option>
                        </select>
                        <button type="submit" class="btn">Update</button>
                    </form>
                    <!-- Delete Question -->
                    <form action="/admin/remove_question/{{ q['id'] }}" method="post" style="display:inline;">
                        <button type="submit" class="btn danger">Delete</button>
                    </form>
                </td>
            </tr>
            {% endfor %}
        </table>

        <a href="/admin/dashboard" class="btn" style="margin-top:20px;">Back to Dashboard</a>
    </div>
</body>
</html>
