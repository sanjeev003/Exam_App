<!DOCTYPE html>
<html>
<head>
    <title>Manage Students</title>
    <style>
        body { font-family: "Segoe UI", Arial, sans-serif; background:#f4f6f9; margin:0; padding:0; }
        header { background:#2c3e50; color:#fff; padding:20px; text-align:center; }
        .container { max-width:800px; margin:40px auto; background:#fff; padding:30px; border-radius:10px; box-shadow:0 6px 15px rgba(0,0,0,0.1); }
        table { width:100%; border-collapse:collapse; margin-top:20px; }
        th, td { border:1px solid #ddd; padding:10px; text-align:center; }
        th { background:#3498db; color:#fff; }
        .btn { padding:6px 12px; background:#27ae60; color:#fff; border:none; border-radius:6px; cursor:pointer; }
        .btn.danger { background:#e74c3c; }
        .btn:hover { opacity:0.9; }
        .form-inline { display:flex; gap:10px; margin-top:20px; }
        input { padding:6px; border:1px solid #ccc; border-radius:4px; }
    </style>
</head>
<body>
    <header>
        <h1>Admin Panel - Manage Students</h1>
    </header>

    <div class="container">
        <h2>Student List</h2>

        <!-- Add Student Form -->
        <form action="/admin/add_student" method="post" class="form-inline">
            <input type="text" name="roll_no" placeholder="Roll No" required>
            <input type="text" name="name" placeholder="Name" required>
            <button type="submit" class="btn">Add Student</button>
        </form>

        <!-- Student Table -->
        <table>
            <tr>
                <th>Roll No</th>
                <th>Name</th>
                <th>Actions</th>
            </tr>
            {% for s in students %}
            <tr>
                <td>{{ s['roll_no'] }}</td>
                <td>{{ s['name'] }}</td>
                <td>
                    <!-- Update Name -->
                    <form action="/admin/update_student/{{ s['roll_no'] }}" method="post" style="display:inline;">
                        <input type="text" name="new_name" placeholder="New Name" required>
                        <button type="submit" class="btn">Update</button>
                    </form>
                    <!-- Delete Student -->
                    <form action="/admin/remove_student/{{ s['roll_no'] }}" method="post" style="display:inline;">
                        <button type="submit" class="btn danger">Delete</button>
                    </form>
                </td>
            </tr>
            {% endfor %}
        </table>

        <a href="/admin/dashboard" class="btn" style="margin-top:20px;">Back to Dashboard</a>
    </div>
</body>
</html>
