<!DOCTYPE html>
<html>
<head>
    <title>Exam Page</title>
    <style>
        body { font-family: "Segoe UI", Arial, sans-serif; background: #f4f6f9; margin:0; padding:0; }
        header { background:#2c3e50; color:#fff; padding:15px; text-align:center; }
        #timer { font-size:22px; font-weight:bold; color:#e74c3c; margin:20px; text-align:center; }
        .exam-container { max-width:800px; margin:20px auto; background:#fff; padding:25px; border-radius:8px; }
        .question { margin-bottom:20px; padding:15px; border-bottom:1px solid #ddd; }
        .question p { font-weight:bold; margin-bottom:10px; }
        label { display:block; margin:5px 0; }
        button { display:block; width:100%; padding:12px; background:#27ae60; color:#fff; font-size:18px; border:none; border-radius:6px; margin-top:20px; cursor:pointer; }
        button:hover { background:#219150; }
    </style>
</head>
<body>
    <header>
        <h2>Welcome, {{ student['name'] }} (Roll No: {{ student['roll_no'] }})</h2>
    </header>

    <div id="timer">Click "Start Exam" to begin</div>

    <div class="exam-container">
        <p>You have 30 minutes to complete 30 questions.</p>
        <form id="examForm" method="POST" action="/submit">
            {% for q in questions %}
            <div class="question">
                <p>Q{{ loop.index }}. {{ q['text'] }}</p>
                <label><input type="radio" name="{{ q['id'] }}" value="option_a"> {{ q['option_a'] }}</label>
                <label><input type="radio" name="{{ q['id'] }}" value="option_b"> {{ q['option_b'] }}</label>
                <label><input type="radio" name="{{ q['id'] }}" value="option_c"> {{ q['option_c'] }}</label>
                <label><input type="radio" name="{{ q['id'] }}" value="option_d"> {{ q['option_d'] }}</label>
            </div>
            {% endfor %}
            <button type="submit">Submit Exam</button>
        </form>
    </div>

    <script>
    let timerInterval;

    function startExam() {
        const startTime = Date.parse("{{ start_time }}");  // backend sends ISO format
        const duration = 30 * 60 * 1000; // 30 minutes
        const endTime = startTime + duration;

        timerInterval = setInterval(function() {
            const now = Date.now();
            const remaining = endTime - now;

            if (remaining <= 0) {
                clearInterval(timerInterval);
                document.getElementById("timer").innerHTML = "Time is up! Please submit your exam.";
                // ❌ No auto-submit
            } else {
                const minutes = Math.floor(remaining / 1000 / 60);
                const seconds = Math.floor((remaining / 1000) % 60);
                document.getElementById("timer").innerHTML =
                    minutes + "m " + seconds + "s remaining";
            }
        }, 1000);
    }

    document.addEventListener("DOMContentLoaded", function() {
        const btn = document.createElement("button");
        btn.textContent = "Start Exam";
        btn.style = "padding:10px 20px; background:#3498db; color:#fff; border:none; border-radius:6px; cursor:pointer; font-size:16px;";
        btn.onclick = function() {
            btn.style.display = "none";
            startExam();
        };
        document.body.insertBefore(btn, document.body.firstChild);
    });
    </script>
</body>
</html>
